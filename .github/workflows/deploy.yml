name: Deploy to Vercel

# Deploy hook is also fired by Vercel's git integration on push to main.
# Keeping push triggers here would double-fire builds, so this workflow is
# manual-only.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          echo "Triggering Vercel deployment..."
          curl -X POST "${{ secrets.PODCAST_DEPLOY_HOOK }}"
          echo "Deployment triggered!"
