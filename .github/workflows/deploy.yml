name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          echo "Triggering Vercel deployment..."
          curl -X POST "${{ secrets.PODCAST_DEPLOY_HOOK }}"
          echo "Deployment triggered!"
